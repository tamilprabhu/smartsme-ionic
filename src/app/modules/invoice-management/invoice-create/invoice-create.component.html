<app-header
    title="Create Invoice"
    backAction="custom"
    [showBackButton]="true"
    (backClicked)="onCancel()"
>
</app-header>

<ion-content>
    <app-invoice
        mode="create"
        [serverValidationErrors]="serverValidationErrors"
        (formSubmit)="onSubmit($event)"
        (formClosed)="onCancel()"
    >
    </app-invoice>
</ion-content>
