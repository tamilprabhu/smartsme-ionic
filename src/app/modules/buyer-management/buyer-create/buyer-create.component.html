<app-header
  title="Create Buyer"
  backAction="custom"
  [showBackButton]="true"
  (backClicked)="onCancel()">
</app-header>

<ion-content>
  <app-buyer
    [mode]="'create'"
    [serverValidationErrors]="serverValidationErrors"
    (formSubmit)="onSubmit($event)"
    (formClosed)="onCancel()">
  </app-buyer>
</ion-content>
