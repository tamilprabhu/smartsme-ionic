<app-header
  title="Update Product"
  backAction="custom"
  [showBackButton]="true"
  (backClicked)="onCancel()">
</app-header>

<ion-content>
  <div *ngIf="loading" class="ion-padding ion-text-center">Loading...</div>

  <app-product
    *ngIf="!loading && product"
    [mode]="'update'"
    [formData]="product"
    [serverValidationErrors]="serverValidationErrors"
    (formSubmit)="onSubmit($event)"
    (formClosed)="onCancel()">
  </app-product>
</ion-content>
