<app-header
  title="Seller Details"
  backAction="custom"
  [showBackButton]="true"
  rightIconColor="primary"
  (backClicked)="onBack()"
  (rightButtonClicked)="onEdit()">
</app-header>

<ion-content>
  <div *ngIf="loading" class="ion-padding ion-text-center">Loading...</div>

  <app-sellers
    *ngIf="!loading && seller"
    [mode]="'read'"
    [formData]="seller"
    (formClosed)="onBack()">
  </app-sellers>
</ion-content>
