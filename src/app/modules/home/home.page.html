<ion-header>
    <ion-toolbar>
        <ion-title>Dashboard</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content>
    <ng-container *ngIf="!dashboardLoading; else dashboardLoader">
        <section class="dash-hero">
            <div class="dash-hero__brand">
                <img class="dash-hero__logo" src="assets/images/sme-logo.png" alt="App Logo" />
                <div class="dash-hero__text">
                    <h1>Dashboard Overview</h1>
                    <p>{{ companyName || 'Company' }}</p>
                </div>
            </div>
        </section>

        <section class="dash-grid">
            <ion-card
                class="dash-card dash-card--clickable ion-activatable"
                *ngIf="canViewStock"
                (click)="openStockInward()"
            >
                <ion-card-header>
                    <ion-card-title>Stock Inward</ion-card-title>
                    <ion-card-subtitle>Heads-up on recent inward</ion-card-subtitle>
                </ion-card-header>
                <ion-card-content>
                    <div class="dash-metric">
                        <span>Total Entries</span>
                        <strong>{{ stockSummary.total | number }}</strong>
                    </div>
                    <div class="dash-metric" *ngIf="stockSummary.latestDate">
                        <span>Latest Inward</span>
                        <strong>{{ stockSummary.latestDate | date:'mediumDate' }}</strong>
                    </div>
                    <div class="dash-metric" *ngIf="stockSummary.latestMaterial">
                        <span>Material</span>
                        <strong>{{ stockSummary.latestMaterial }}</strong>
                    </div>
                </ion-card-content>
                <ion-ripple-effect></ion-ripple-effect>
            </ion-card>

            <ion-card class="dash-card dash-card--overview" *ngIf="summaryCards.length">
                <ion-card-header>
                    <ion-card-title>Overview</ion-card-title>
                    <ion-card-subtitle>Counts & summary</ion-card-subtitle>
                </ion-card-header>
                <ion-card-content>
                    <div class="dash-summary">
                        <button
                            type="button"
                            class="dash-summary__item ion-activatable"
                            *ngFor="let item of summaryCards"
                            (click)="openOverviewModule(item.key)"
                        >
                            <div class="dash-summary__label">{{ item.label }}</div>
                            <div class="dash-summary__value">{{ item.count | number }}</div>
                            <ion-ripple-effect></ion-ripple-effect>
                        </button>
                    </div>
                </ion-card-content>
            </ion-card>
        </section>
    </ng-container>

    <ng-template #dashboardLoader>
        <section class="dash-hero">
            <div class="dash-hero__brand dash-loader-card">
                <div class="dash-hero__logo dash-loader-block"></div>
                <div class="dash-hero__text dash-loader-copy">
                    <span class="dash-loader-line dash-loader-line--title"></span>
                    <span class="dash-loader-line dash-loader-line--text"></span>
                </div>
            </div>
        </section>

        <section class="dash-grid">
            <ion-card class="dash-card dash-loader-card">
                <ion-card-content>
                    <div class="dash-loader-line dash-loader-line--title"></div>
                    <div class="dash-loader-line dash-loader-line--text"></div>
                    <div class="dash-metric" *ngFor="let _ of [1, 2, 3]">
                        <span class="dash-loader-line dash-loader-line--metric"></span>
                        <span class="dash-loader-line dash-loader-line--value"></span>
                    </div>
                </ion-card-content>
            </ion-card>

            <ion-card class="dash-card dash-loader-card">
                <ion-card-content>
                    <div class="dash-loader-line dash-loader-line--title"></div>
                    <div class="dash-loader-line dash-loader-line--text"></div>
                    <div class="dash-summary">
                        <div class="dash-summary__item" *ngFor="let _ of [1,2,3,4]">
                            <span class="dash-loader-line dash-loader-line--metric"></span>
                            <span class="dash-loader-line dash-loader-line--value"></span>
                        </div>
                    </div>
                </ion-card-content>
            </ion-card>
        </section>
    </ng-template>
</ion-content>
