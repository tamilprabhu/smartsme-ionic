<app-header
  title="Update Machine"
  backAction="custom"
  [showBackButton]="true"
  (backClicked)="onCancel()">
</app-header>

<ion-content>
  <div *ngIf="loading" class="ion-padding ion-text-center">Loading...</div>

  <app-machine
    *ngIf="!loading && machine"
    [mode]="'update'"
    [formData]="machine"
    [serverValidationErrors]="serverValidationErrors"
    (formSubmit)="onSubmit($event)"
    (formClosed)="onCancel()">
  </app-machine>
</ion-content>
